server {
    listen 80;
    server_name theheritageedit.com www.theheritageedit.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name theheritageedit.com www.theheritageedit.com;

    root /var/www/heritage-edit/public;
    index index.php;

    ssl_certificate     /etc/letsencrypt/live/theheritageedit.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/theheritageedit.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Static assets — long cache
    location ~* \.(css|js|png|jpg|jpeg|gif|webp|woff2|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Block sensitive files
    location ~ /\.(env|htaccess|git) { deny all; }
    location ~ ^/(src|config|database|composer\.(json|lock))/ { deny all; }

    # PHP
    location ~ \.php$ {
        fastcgi_pass   unix:/run/php/php8.2-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Route all through index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Webhook endpoint — no buffer
    location /api/webhooks/ {
        fastcgi_pass   unix:/run/php/php8.2-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root/index.php;
        include        fastcgi_params;
        fastcgi_read_timeout 30s;
    }

    client_max_body_size 50M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
